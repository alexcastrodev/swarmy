name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-24.04-arm
            target: linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal (Linux)
        if: runner.os == 'Linux'
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install Crystal (macOS)
        if: runner.os == 'macOS'
        run: brew install crystal

      - name: Run specs
        run: make test

      - name: Build
        run: make build

      - name: Package
        run: |
          tar czf swarmy-${{ matrix.target }}.tar.gz -C bin swarmy

      - uses: actions/upload-artifact@v4
        with:
          name: swarmy-${{ matrix.target }}
          path: swarmy-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: swarmy-*.tar.gz
          generate_release_notes: true

  update-formula:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256
        id: sha
        run: |
          echo "darwin_arm64=$(sha256sum swarmy-darwin-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(sha256sum swarmy-linux-amd64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum swarmy-linux-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          repository: alexcastrodev/homebrew-swarmy
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          F=Formula/swarmy.rb
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$F"
          sed -i "/darwin-arm64/{ n; s/sha256 \".*\"/sha256 \"${{ steps.sha.outputs.darwin_arm64 }}\"/ }" "$F"
          sed -i "/linux-amd64/{ n; s/sha256 \".*\"/sha256 \"${{ steps.sha.outputs.linux_amd64 }}\"/ }" "$F"
          sed -i "/linux-arm64/{ n; s/sha256 \".*\"/sha256 \"${{ steps.sha.outputs.linux_arm64 }}\"/ }" "$F"

      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/swarmy.rb
          git commit -m "swarmy ${GITHUB_REF_NAME}"
          git push
